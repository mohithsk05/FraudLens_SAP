name: fraudlens_mobile
description: "Real-Time, On-Device AI for Social Media & Messaging Scam Detection - Citizen Protection India"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # On-device ML classification
  tflite_flutter: ^0.10.1
  
  # HTTP API calls to backend APIs
  http: ^1.2.0
  
  # Geolocation & Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  
  # Local storage configurations
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Interception and alerts
  flutter_local_notifications: ^16.1.0
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/classifier.tflite
    - assets/models/vectorizer.json
